version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: smartbank-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: bank
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5
      start_period: 30s

  app:
    build: .
    container_name: smartbank-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mysql://db:3306/bank
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-bXlTdXBlclNlY3JldEtleUZvckJhbmtpbmdTeXN0ZW0xMjM0NTY=}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      SHOW_SQL: "false"
      LOG_LEVEL: WARN

volumes:
  db_data:
